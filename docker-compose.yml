services:
  # PostgreSQL Database
  postgres_service:
    image: postgres:15-alpine
    container_name: postgres_container
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis_service:
    image: redis:7-alpine
    container_name: redis_container
    env_file:
      - .env.docker
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--requirepass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Application
  django_app_service:
    build: .
    container_name: django_app_container
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
      - static_data:/app/staticfiles
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=your-secret-key-change-in-production
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres_service
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis_service
      - REDIS_PORT=6379
    depends_on:
      postgres_service:
        condition: service_healthy
      redis_service:
        condition: service_healthy

  # Celery Worker
  celery_worker:
    build: .
    container_name: celery_worker_container
    env_file:
      - .env.docker
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      postgres_service:
        condition: service_healthy
      redis_service:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
