{% extends "base.html" %}
{% load static %}

{% load i18n %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">{% trans "Sign Up" %}</h2>
            
            <form class="card p-4 shadow" method="post" action="{% url 'account_signup' %}">
                {% csrf_token %}
                
                {{ form.non_field_errors }}
                
                <div class="mb-3">
                    {{ form.username.label_tag }}
                    {{ form.username }}
                    {{ form.username.errors }}
                </div>
                
                <!-- Add your custom fields, styling, etc. -->
                <div class="mb-3">
                    {{ form.email.label_tag }}
                    {{ form.email }}
                </div>
                
                <!-- Use crispy or manual fields as preferred -->
                
                <button type="submit" class="btn btn-primary w-100">{% trans "Sign Up" %}</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
